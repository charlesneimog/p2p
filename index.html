<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
        <title>Conferência P2P - WebRTC com Cloudflare Signaling</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                padding: 20px;
            }

            .container {
                max-width: 1400px;
                margin: 0 auto;
            }

            /* Header */
            .header {
                background: white;
                border-radius: 16px;
                padding: 20px;
                margin-bottom: 20px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }

            .room-controls {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                align-items: center;
            }

            input {
                flex: 1;
                padding: 12px 16px;
                font-size: 16px;
                border: 2px solid #e0e0e0;
                border-radius: 8px;
                transition: border-color 0.3s;
            }

            input:focus {
                outline: none;
                border-color: #667eea;
            }

            button {
                padding: 12px 24px;
                font-size: 16px;
                font-weight: 600;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.3s;
                background: #667eea;
                color: white;
            }

            button:hover {
                background: #5a67d8;
                transform: translateY(-2px);
            }

            button:disabled {
                background: #ccc;
                cursor: not-allowed;
                transform: none;
            }

            .status {
                margin-top: 12px;
                padding: 10px;
                border-radius: 8px;
                font-size: 14px;
            }

            .status.connected {
                background: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
            }

            .status.disconnected {
                background: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
            }

            .status.connecting {
                background: #fff3cd;
                color: #856404;
                border: 1px solid #ffeeba;
            }

            /* Grid de participantes */
            .participants-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 20px;
                margin-bottom: 20px;
            }

            .participant-card {
                background: white;
                border-radius: 16px;
                padding: 20px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                transition: transform 0.3s;
            }

            .participant-card:hover {
                transform: translateY(-5px);
            }

            .participant-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 16px;
                padding-bottom: 12px;
                border-bottom: 2px solid #f0f0f0;
            }

            .participant-name {
                font-size: 18px;
                font-weight: 600;
                color: #333;
            }

            .participant-status {
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background: #ccc;
            }

            .participant-status.connected {
                background: #4caf50;
                box-shadow: 0 0 8px #4caf50;
            }

            /* Canvas para posições */
            .canvas-container {
                background: white;
                border-radius: 16px;
                padding: 20px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                margin-bottom: 20px;
            }

            canvas {
                width: 100%;
                height: auto;
                background: #f8f9fa;
                border-radius: 8px;
                border: 2px solid #e0e0e0;
                cursor: crosshair;
            }

            /* Controles */
            .controls {
                background: white;
                border-radius: 16px;
                padding: 20px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }

            .color-picker {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                margin-bottom: 16px;
            }

            .color-option {
                width: 48px;
                height: 48px;
                border-radius: 50%;
                cursor: pointer;
                transition: transform 0.2s;
                border: 3px solid transparent;
            }

            .color-option:hover {
                transform: scale(1.1);
            }

            .color-option.selected {
                border-color: #333;
                transform: scale(1.1);
            }

            .event-log {
                margin-top: 16px;
                padding: 12px;
                background: #f8f9fa;
                border-radius: 8px;
                font-size: 12px;
                max-height: 150px;
                overflow-y: auto;
            }

            .log-entry {
                padding: 4px 8px;
                margin: 2px 0;
                border-left: 3px solid #667eea;
                font-family: monospace;
            }

            @media (max-width: 768px) {
                .participants-grid {
                    grid-template-columns: 1fr;
                }

                button {
                    padding: 10px 16px;
                    font-size: 14px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <div class="room-controls">
                    <input
                        type="text"
                        id="roomName"
                        placeholder="Nome da sala (ex: grupo-familia)"
                        value="sala-padrao"
                    />
                    <input type="text" id="userName" placeholder="Seu nome" value="Participante" />
                    <input
                        type="text"
                        id="signalingUrl"
                        placeholder="URL do Signaling Server"
                        value="https://p2p.charlesneimog.workers.dev/"
                        style="flex: 0.8"
                    />
                    <button id="connectBtn">🔌 Entrar na Sala</button>
                    <button id="disconnectBtn" disabled>🔌 Sair da Sala</button>
                </div>
                <div id="status" class="status disconnected">Desconectado</div>
            </div>

            <div class="participants-grid" id="participantsGrid"></div>

            <div class="canvas-container">
                <canvas
                    id="positionCanvas"
                    width="800"
                    height="500"
                    style="width: 100%; height: auto; max-width: 800px; margin: 0 auto; display: block"
                ></canvas>
            </div>

            <div class="controls">
                <div class="color-picker" id="colorPicker">
                    <div class="color-option" style="background: #ff6b6b" data-color="#FF6B6B"></div>
                    <div class="color-option" style="background: #4ecdc4" data-color="#4ECDC4"></div>
                    <div class="color-option" style="background: #45b7d1" data-color="#45B7D1"></div>
                    <div class="color-option" style="background: #96ceb4" data-color="#96CEB4"></div>
                    <div class="color-option" style="background: #ffeaa7" data-color="#FFEAA7"></div>
                    <div class="color-option" style="background: #dda0dd" data-color="#DDA0DD"></div>
                </div>
                <button id="sendEventBtn">📨 Enviar Evento de Teste</button>
                <div class="event-log" id="eventLog"></div>
            </div>
        </div>

        <script>
            // Configuração WebRTC
            const configuration = {
                iceServers: [
                    { urls: "stun:stun.l.google.com:19302" },
                    { urls: "stun:stun1.l.google.com:19302" },
                    { urls: "stun:stun2.l.google.com:19302" },
                    // Adicione um servidor TURN aqui se necessário
                    // { urls: 'turn:seu-turn-server.com', username: 'user', credential: 'pass' }
                ],
            };

            // Estado da aplicação
            let peerConnections = new Map(); // id do peer -> RTCPeerConnection
            let dataChannels = new Map(); // id do peer -> RTCDataChannel
            let signalingWs = null;
            let currentRoom = null;
            let currentUser = null;
            let myId = null;
            let peers = new Map(); // id -> { name, color, position }

            // Meus dados
            let myColor = "#FF6B6B";
            let myPosition = { x: 400, y: 250 };

            // Canvas
            const canvas = document.getElementById("positionCanvas");
            const ctx = canvas.getContext("2d");

            // DOM Elements
            const connectBtn = document.getElementById("connectBtn");
            const disconnectBtn = document.getElementById("disconnectBtn");
            const roomNameInput = document.getElementById("roomName");
            const userNameInput = document.getElementById("userName");
            const signalingUrlInput = document.getElementById("signalingUrl");
            const statusDiv = document.getElementById("status");
            const participantsGrid = document.getElementById("participantsGrid");
            const eventLog = document.getElementById("eventLog");

            // Helper: Adicionar log
            function addLog(message, type = "info") {
                const entry = document.createElement("div");
                entry.className = "log-entry";
                entry.style.borderLeftColor = type === "error" ? "#dc3545" : type === "success" ? "#28a745" : "#667eea";
                entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
                eventLog.insertBefore(entry, eventLog.firstChild);
                if (eventLog.children.length > 50) {
                    eventLog.removeChild(eventLog.lastChild);
                }
            }

            // Atualizar status UI
            function updateStatus(text, state) {
                statusDiv.textContent = text;
                statusDiv.className = `status ${state}`;
            }

            // Criar ou obter peer connection para um peer
            async function createPeerConnection(peerId) {
                if (peerConnections.has(peerId)) {
                    return peerConnections.get(peerId);
                }

                const pc = new RTCPeerConnection(configuration);
                peerConnections.set(peerId, pc);

                // Criar data channel
                const dc = pc.createDataChannel("chat");
                dataChannels.set(peerId, dc);

                // Configurar handlers do data channel
                dc.onopen = () => {
                    addLog(`📡 DataChannel aberto com ${peers.get(peerId)?.name || peerId}`, "success");
                    sendStateToPeer(peerId);
                };

                dc.onclose = () => addLog(`📡 DataChannel fechado com ${peers.get(peerId)?.name || peerId}`);

                dc.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    handlePeerMessage(peerId, data);
                };

                // Ice candidate handler
                pc.onicecandidate = (event) => {
                    if (event.candidate && signalingWs && signalingWs.readyState === WebSocket.OPEN) {
                        signalingWs.send(
                            JSON.stringify({
                                type: "ice-candidate",
                                to: peerId,
                                candidate: event.candidate,
                            }),
                        );
                    }
                };

                pc.oniceconnectionstatechange = () => {
                    addLog(`🔌 Conexão ICE com ${peers.get(peerId)?.name || peerId}: ${pc.iceConnectionState}`);
                    updateParticipantStatus(peerId, pc.iceConnectionState === "connected");
                };

                return pc;
            }

            // Enviar meu estado para um peer específico
            function sendStateToPeer(peerId) {
                const dc = dataChannels.get(peerId);
                if (dc && dc.readyState === "open") {
                    dc.send(
                        JSON.stringify({
                            type: "state",
                            name: currentUser,
                            color: myColor,
                            position: myPosition,
                        }),
                    );
                }
            }

            // Broadcast para todos os peers
            function broadcastToAll(data) {
                for (let [peerId, dc] of dataChannels.entries()) {
                    if (dc.readyState === "open") {
                        dc.send(JSON.stringify(data));
                    }
                }
            }

            // Handler de mensagens recebidas dos peers
            function handlePeerMessage(peerId, data) {
                switch (data.type) {
                    case "state":
                        // Atualizar informações do peer
                        const peer = peers.get(peerId) || {};
                        peer.name = data.name;
                        peer.color = data.color;
                        peer.position = data.position;
                        peers.set(peerId, peer);
                        updateParticipantsUI();
                        drawCanvas();
                        addLog(
                            `📍 ${data.name} atualizou: pos(${Math.round(data.position.x)}, ${Math.round(data.position.y)})`,
                            "info",
                        );
                        break;

                    case "position":
                        if (peers.has(peerId)) {
                            peers.get(peerId).position = data.position;
                            drawCanvas();
                        }
                        break;

                    case "color":
                        if (peers.has(peerId)) {
                            peers.get(peerId).color = data.color;
                            updateParticipantsUI();
                            drawCanvas();
                        }
                        break;

                    case "event":
                        addLog(`🎉 Evento de ${peers.get(peerId)?.name || peerId}: ${data.message}`, "info");
                        break;

                    case "ping":
                        const dc = dataChannels.get(peerId);
                        if (dc && dc.readyState === "open") {
                            dc.send(JSON.stringify({ type: "pong" }));
                        }
                        break;
                }
            }

            // Iniciar conexão com um novo peer
            async function initiateConnection(peerId) {
                addLog(`🔗 Iniciando conexão com ${peerId}`);
                const pc = await createPeerConnection(peerId);

                // Criar offer
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                // Enviar offer via signaling
                if (signalingWs && signalingWs.readyState === WebSocket.OPEN) {
                    signalingWs.send(
                        JSON.stringify({
                            type: "offer",
                            to: peerId,
                            sdp: offer,
                        }),
                    );
                }
            }

            // Aceitar conexão de um peer
            async function acceptConnection(peerId, offer) {
                addLog(`🔗 Aceitando conexão de ${peerId}`);
                const pc = await createPeerConnection(peerId);

                await pc.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                if (signalingWs && signalingWs.readyState === WebSocket.OPEN) {
                    signalingWs.send(
                        JSON.stringify({
                            type: "answer",
                            to: peerId,
                            sdp: answer,
                        }),
                    );
                }
            }

            // Conexão WebSocket com signaling server
            function connectToSignaling() {
                const room = roomNameInput.value.trim();
                const signalingUrl = signalingUrlInput.value.trim();

                if (!room || !signalingUrl) {
                    addLog("❌ Preencha o nome da sala e URL do signaling", "error");
                    return;
                }

                currentUser = userNameInput.value.trim() || `User_${Math.floor(Math.random() * 1000)}`;
                currentRoom = room;

                const wsUrl = `${signalingUrl}?room=${encodeURIComponent(room)}`;
                signalingWs = new WebSocket(wsUrl);

                signalingWs.onopen = () => {
                    addLog(`✅ Conectado ao signaling server na sala "${room}"`, "success");
                    updateStatus(`Conectado à sala: ${room} (aguardando peers...)`, "connected");
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;

                    // Enviar mensagem de join
                    signalingWs.send(
                        JSON.stringify({
                            type: "join",
                            name: currentUser,
                        }),
                    );
                };

                signalingWs.onmessage = async (event) => {
                    const message = JSON.parse(event.data);

                    // Se a mensagem tem 'from', é uma mensagem de signaling
                    if (message.from) {
                        const fromId = message.from;
                        const data = message.data;

                        switch (data.type) {
                            case "join":
                                addLog(`👋 Novo participante: ${data.name} (${fromId})`);
                                peers.set(fromId, { name: data.name, color: "#ccc", position: { x: 100, y: 100 } });
                                updateParticipantsUI();
                                await initiateConnection(fromId);
                                break;

                            case "offer":
                                addLog(`📞 Recebendo offer de ${fromId}`);
                                await acceptConnection(fromId, { type: "offer", sdp: data.sdp });
                                break;

                            case "answer":
                                addLog(`📞 Recebendo answer de ${fromId}`);
                                const pc = peerConnections.get(fromId);
                                if (pc) {
                                    await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                                }
                                break;

                            case "ice-candidate":
                                const targetPc = peerConnections.get(fromId);
                                if (targetPc && data.candidate) {
                                    await targetPc.addIceCandidate(new RTCIceCandidate(data.candidate));
                                }
                                break;

                            case "leave":
                                addLog(`👋 Participante saiu: ${fromId}`);
                                closePeerConnection(fromId);
                                peers.delete(fromId);
                                updateParticipantsUI();
                                drawCanvas();
                                break;
                        }
                    } else if (message.type === "welcome") {
                        myId = message.id;
                        addLog(`🎉 Seu ID: ${myId}`, "success");
                    }
                };

                signalingWs.onerror = (error) => {
                    addLog(`❌ Erro no signaling: ${error}`, "error");
                };

                signalingWs.onclose = () => {
                    addLog(`🔌 Desconectado do signaling server`);
                    disconnect();
                };
            }

            function closePeerConnection(peerId) {
                const dc = dataChannels.get(peerId);
                if (dc) {
                    dc.close();
                    dataChannels.delete(peerId);
                }

                const pc = peerConnections.get(peerId);
                if (pc) {
                    pc.close();
                    peerConnections.delete(peerId);
                }
            }

            function disconnect() {
                // Fechar todas as conexões peer-to-peer
                for (let peerId of peerConnections.keys()) {
                    closePeerConnection(peerId);
                }

                // Fechar signaling
                if (signalingWs) {
                    signalingWs.close();
                    signalingWs = null;
                }

                // Limpar estado
                peerConnections.clear();
                dataChannels.clear();
                peers.clear();
                myId = null;

                updateStatus("Desconectado", "disconnected");
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                participantsGrid.innerHTML =
                    '<div style="grid-column:1/-1; text-align:center; padding:40px;">Nenhum participante na sala</div>';
                drawCanvas();
            }

            // Atualizar UI de participantes
            function updateParticipantsUI() {
                if (peers.size === 0) {
                    participantsGrid.innerHTML =
                        '<div style="grid-column:1/-1; text-align:center; padding:40px;">Nenhum participante na sala</div>';
                    return;
                }

                participantsGrid.innerHTML = "";
                for (let [id, peer] of peers.entries()) {
                    const card = document.createElement("div");
                    card.className = "participant-card";
                    card.innerHTML = `
                    <div class="participant-header">
                        <span class="participant-name">${escapeHtml(peer.name)}</span>
                        <div class="participant-status ${dataChannels.has(id) && dataChannels.get(id).readyState === "open" ? "connected" : ""}"></div>
                    </div>
                    <div style="font-size:12px; color:#666;">ID: ${id.substring(0, 8)}...</div>
                    <div style="margin-top:8px;">
                        <div style="display:inline-block; width:24px; height:24px; border-radius:4px; background:${peer.color};"></div>
                    </div>
                `;
                    participantsGrid.appendChild(card);
                }
            }

            function updateParticipantStatus(peerId, connected) {
                // Atualização visual pode ser feita no próximo render
                updateParticipantsUI();
            }

            // Canvas: desenhar posições
            function drawCanvas() {
                if (!ctx) return;

                // Limpar canvas
                ctx.fillStyle = "#f8f9fa";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Desenhar grid
                ctx.strokeStyle = "#ddd";
                ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(canvas.width, i);
                    ctx.stroke();
                }

                // Desenhar meu ponto
                ctx.shadowBlur = 10;
                ctx.shadowColor = myColor;
                ctx.beginPath();
                ctx.arc(myPosition.x, myPosition.y, 20, 0, 2 * Math.PI);
                ctx.fillStyle = myColor;
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.shadowBlur = 0;
                ctx.fillText("Você", myPosition.x - 20, myPosition.y - 15);

                // Desenhar pontos dos peers
                for (let [id, peer] of peers.entries()) {
                    if (peer.position) {
                        ctx.beginPath();
                        ctx.arc(peer.position.x, peer.position.y, 18, 0, 2 * Math.PI);
                        ctx.fillStyle = peer.color;
                        ctx.fill();
                        ctx.strokeStyle = "white";
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        ctx.fillStyle = "#333";
                        ctx.font = "12px Arial";
                        ctx.fillText(peer.name, peer.position.x - 15, peer.position.y - 12);
                    }
                }
            }

            // Evento de clique no canvas para atualizar posição
            function setupCanvasEvents() {
                canvas.addEventListener("click", (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    const x = (e.clientX - rect.left) * scaleX;
                    const y = (e.clientY - rect.top) * scaleY;

                    myPosition = {
                        x: Math.max(20, Math.min(canvas.width - 20, x)),
                        y: Math.max(20, Math.min(canvas.height - 20, y)),
                    };
                    drawCanvas();

                    // Broadcast nova posição
                    broadcastToAll({ type: "position", position: myPosition });
                    addLog(`📍 Você moveu para (${Math.round(x)}, ${Math.round(y)})`);
                });
            }

            // Escolher cor
            function setupColorPicker() {
                const colorOptions = document.querySelectorAll(".color-option");
                colorOptions.forEach((opt) => {
                    opt.addEventListener("click", () => {
                        colorOptions.forEach((o) => o.classList.remove("selected"));
                        opt.classList.add("selected");
                        myColor = opt.dataset.color;
                        broadcastToAll({ type: "color", color: myColor });
                        addLog(`🎨 Você mudou a cor para ${myColor}`);
                        drawCanvas();
                        updateParticipantsUI();
                    });
                });
                // Selecionar primeira cor
                if (colorOptions[0]) colorOptions[0].classList.add("selected");
            }

            // Enviar evento de teste
            function sendTestEvent() {
                broadcastToAll({ type: "event", message: `Evento de ${currentUser}` });
                addLog(`📨 Você enviou um evento para todos`, "success");
            }

            // Helper escape HTML
            function escapeHtml(str) {
                return str.replace(/[&<>]/g, function (m) {
                    if (m === "&") return "&amp;";
                    if (m === "<") return "&lt;";
                    if (m === ">") return "&gt;";
                    return m;
                });
            }

            // Inicializar eventos da UI
            function initUI() {
                connectBtn.onclick = connectToSignaling;
                disconnectBtn.onclick = disconnect;
                document.getElementById("sendEventBtn").onclick = sendTestEvent;
                setupCanvasEvents();
                setupColorPicker();

                // Posição inicial aleatória
                myPosition = { x: canvas.width / 2, y: canvas.height / 2 };
                drawCanvas();
            }

            // Iniciar
            initUI();

            // Animação de ping periódico para manter conexões
            setInterval(() => {
                if (signalingWs && signalingWs.readyState === WebSocket.OPEN) {
                    broadcastToAll({ type: "ping" });
                }
            }, 30000);
        </script>
    </body>
</html>
