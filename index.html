<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>P2P Networking Prototype</title>
        <link href="https://fonts.googleapis.com" rel="preconnect" />
        <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
        <link
            href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            "inverse-on-surface": "#f1f1f1",
                            "surface-tint": "#5e5e5e",
                            error: "#ba1a1a",
                            "on-primary-fixed": "#1b1b1b",
                            "on-surface": "#1b1b1b",
                            "inverse-surface": "#303030",
                            tertiary: "#000000",
                            "surface-container": "#eeeeee",
                            secondary: "#5e5e5e",
                            "surface-variant": "#e2e2e2",
                            "on-primary": "#ffffff",
                            "on-background": "#1b1b1b",
                            "primary-fixed-dim": "#c6c6c6",
                            "error-container": "#ffdad6",
                            "tertiary-container": "#1b1b1b",
                            "on-secondary-fixed-variant": "#464747",
                            "on-error-container": "#93000a",
                            "surface-bright": "#f9f9f9",
                            background: "#f9f9f9",
                            "surface-container-lowest": "#ffffff",
                            "on-surface-variant": "#4c4546",
                            "on-tertiary-fixed-variant": "#474747",
                            "on-tertiary-container": "#848484",
                            "secondary-container": "#e1dfdf",
                            "surface-container-highest": "#e2e2e2",
                            "on-primary-container": "#848484",
                            "surface-container-high": "#e8e8e8",
                            surface: "#f9f9f9",
                            "tertiary-fixed-dim": "#c6c6c6",
                            "on-secondary-fixed": "#1b1c1c",
                            "secondary-fixed": "#e4e2e2",
                            "on-primary-fixed-variant": "#474747",
                            "secondary-fixed-dim": "#c7c6c6",
                            "surface-dim": "#dadada",
                            "on-error": "#ffffff",
                            "inverse-primary": "#c6c6c6",
                            "on-secondary-container": "#636262",
                            primary: "#000000",
                            "tertiary-fixed": "#e2e2e2",
                            outline: "#7e7576",
                            "surface-container-low": "#f3f3f3",
                            "primary-container": "#1b1b1b",
                            "outline-variant": "#cfc4c5",
                            "on-tertiary": "#ffffff",
                            "primary-fixed": "#e2e2e2",
                            "on-tertiary-fixed": "#1b1b1b",
                            "on-secondary": "#ffffff",
                        },
                        borderRadius: {
                            DEFAULT: "0.125rem",
                            lg: "0.25rem",
                            xl: "0.5rem",
                            full: "0.75rem",
                        },
                        spacing: {
                            gutter: "2rem",
                            "margin-page": "4rem",
                            "section-gap": "8rem",
                            "element-gap": "1rem",
                            "margin-mobile": "1.5rem",
                        },
                        fontFamily: {
                            "headline-lg-mobile": ["Hanken Grotesk"],
                            display: ["Hanken Grotesk"],
                            "headline-md": ["Hanken Grotesk"],
                            "label-md": ["Hanken Grotesk"],
                            "body-lg": ["Hanken Grotesk"],
                            "label-sm": ["Hanken Grotesk"],
                            "headline-lg": ["Hanken Grotesk"],
                            "body-md": ["Hanken Grotesk"],
                        },
                    },
                },
            };
        </script>
        <style>
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }
            .material-symbols-outlined[data-weight="fill"] {
                font-variation-settings:
                    "FILL" 1,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }

            /* Custom Scrollbar for the console */
            #console-log::-webkit-scrollbar {
                width: 8px;
            }
            #console-log::-webkit-scrollbar-track {
                background: #303030;
                border-radius: 4px;
            }
            #console-log::-webkit-scrollbar-thumb {
                background: #5e5e5e;
                border-radius: 4px;
            }
        </style>
    </head>
    <body
        class="bg-background text-on-background min-h-screen font-body-md text-body-md antialiased selection:bg-surface-variant selection:text-on-background flex flex-col items-center"
    >
        <main class="w-full max-w-[600px] px-margin-mobile md:px-0 py-12 flex flex-col gap-element-gap">
            <h1
                class="text-3xl font-bold tracking-tight text-text-light-primary dark:text-text-dark-primary sm:text-4xl"
            >
                P2P Prototype
            </h1>
            <section
                class="bg-surface-container-lowest border border-outline-variant rounded-xl p-6 flex flex-col gap-6 shadow-sm"
            >
                <header class="flex flex-col gap-3 pb-6 mb-2 border-b border-outline-variant w-full">
                    <p class="font-body-md text-body-md text-secondary max-w-prose">
                        Access this URL on a secondary device (smartphone or desktop) to establish a signaling channel
                        and test the peer-to-peer connection.
                    </p>
                </header>
                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="flex-1 flex flex-col gap-2">
                        <label class="font-label-md text-label-md text-secondary" for="room-name">Room name</label>
                        <input
                            class="w-full bg-surface-container-low border-b border-outline-variant px-4 py-2 font-body-md text-body-md text-on-background focus:outline-none focus:border-primary focus:bg-surface transition-colors"
                            id="room-name"
                            placeholder="Enter room ID"
                            type="text"
                            value="node-alpha"
                        />
                    </div>
                    <div class="flex-1 flex flex-col gap-2">
                        <label class="font-label-md text-label-md text-secondary" for="user-name">User name</label>
                        <input
                            class="w-full bg-surface-container-low border-b border-outline-variant px-4 py-2 font-body-md text-body-md text-on-background focus:outline-none focus:border-primary focus:bg-surface transition-colors"
                            id="user-name"
                            placeholder="Enter handle"
                            type="text"
                            value="user_7734"
                        />
                    </div>
                </div>
                <div class="flex gap-4 items-center">
                    <button
                        class="bg-primary text-on-primary font-label-md text-label-md px-6 py-2 rounded-lg hover:opacity-90 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                        id="btn-connect"
                    >
                        Connect
                    </button>
                    <button
                        class="bg-transparent border border-outline text-outline font-label-md text-label-md px-6 py-2 rounded-lg hover:bg-surface-container-low active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                        disabled
                        id="btn-disconnect"
                    >
                        Disconnect
                    </button>
                </div>
                <div
                    class="w-full bg-error-container text-on-error-container rounded-lg px-4 py-3 flex items-center gap-3 transition-colors duration-300"
                    id="status-bar"
                >
                    <span class="material-symbols-outlined" data-icon="cloud_off" id="status-icon">cloud_off</span>
                    <span class="font-label-md text-label-md" id="status-text">Disconnected</span>
                </div>
            </section>

            <section
                class="bg-surface-container-lowest border border-outline-variant rounded-xl p-6 flex flex-col gap-4 shadow-sm"
            >
                <header class="flex justify-between items-center">
                    <h2 class="font-headline-md text-headline-md text-on-background">Peers</h2>
                    <span
                        class="font-label-sm text-label-sm text-secondary px-3 py-1 bg-surface-container rounded-full"
                        id="peer-count"
                        >0 Connected</span
                    >
                </header>
                <div class="flex flex-wrap gap-3 min-h-[3rem] items-center" id="peer-list">
                    <p class="font-body-md text-body-md text-secondary italic w-full text-center" id="peer-placeholder">
                        No peers connected
                    </p>
                </div>
            </section>

            <section
                class="bg-surface-container-lowest border border-outline-variant rounded-xl p-6 flex flex-col gap-6 shadow-sm"
            >
                <header>
                    <h2 class="font-headline-md text-headline-md text-on-background">Messages</h2>
                </header>
                <div class="flex gap-4">
                    <button
                        class="bg-transparent border border-outline text-primary font-label-md text-label-md px-4 py-2 rounded-lg hover:bg-surface-container-low active:scale-95 transition-all opacity-50 cursor-not-allowed"
                        disabled
                        id="btn-test-msg"
                    >
                        Send Test Message
                    </button>
                    <button
                        class="bg-transparent border border-outline text-primary font-label-md text-label-md px-4 py-2 rounded-lg hover:bg-surface-container-low active:scale-95 transition-all flex items-center gap-2"
                        id="btn-init-mic"
                    >
                        <span class="material-symbols-outlined text-[18px]" data-icon="mic">mic</span>
                        Initialize Mic
                    </button>
                </div>
                <div
                    class="w-full bg-inverse-surface rounded-xl border border-outline-variant p-4 h-64 overflow-y-auto flex flex-col-reverse gap-1 shadow-inner"
                    id="console-log"
                >
                    <div class="text-inverse-on-surface opacity-50 font-label-sm text-label-sm py-1"></div>
                </div>
            </section>
        </main>

        <script src="p2p.js"></script>
        <script>
            const roomInput = document.getElementById("room-name");
            const nameInput = document.getElementById("user-name");
            const numero = Math.floor(Math.random() * 10000); // 0 a 9999
            const numeroFormatado = numero.toString().padStart(4, "0"); // ex: "0042"
            nameInput.value = "user_" + numeroFormatado;

            const connectBtn = document.getElementById("btn-connect");
            const disconnectBtn = document.getElementById("btn-disconnect");
            const statusDiv = document.getElementById("status-bar");
            const statusIcon = document.getElementById("status-icon");
            const statusText = document.getElementById("status-text");
            const peersListDiv = document.getElementById("peer-list");
            const peerCount = document.getElementById("peer-count");
            const logDiv = document.getElementById("console-log");
            const sendMsgBtn = document.getElementById("btn-test-msg");
            const initAudioBtn = document.getElementById("btn-init-mic");

            let network = null;
            let uiRefreshInterval = null;

            // Strict DOM Modification
            function addLog(msg, type = "info") {
                const entry = document.createElement("div");
                entry.className = "font-mono text-sm py-1 border-b border-[#404040] last:border-0 ";

                if (type === "error") {
                    entry.className += "text-[#ffb4ab] font-medium"; // Error tone for dark surface
                } else if (type === "success") {
                    entry.className += "text-[#81c784] font-medium"; // Success tone
                } else {
                    entry.className += "text-inverse-on-surface";
                }

                entry.textContent = `[${new Date().toLocaleTimeString("en-US", { hour12: false })}] ${msg}`;
                logDiv.insertBefore(entry, logDiv.firstChild);
            }

            function updateStatus(text, state) {
                statusText.textContent = text;
                // Reset to baseline container classes
                statusDiv.className =
                    "w-full rounded-lg px-4 py-3 flex items-center gap-3 transition-colors duration-300 ";

                switch (state) {
                    case "disconnected":
                        statusDiv.className += "bg-error-container text-on-error-container";
                        statusIcon.textContent = "cloud_off";
                        break;
                    case "connecting":
                        statusDiv.className += "bg-surface-variant text-on-surface-variant animate-pulse";
                        statusIcon.textContent = "sync";
                        break;
                    case "connected":
                        statusDiv.className += " bg-green-600 text-white";
                        statusIcon.textContent = "cloud_done";
                        break;
                }
            }

            function renderPeers() {
                if (!network || network.peers.size === 0) {
                    peersListDiv.innerHTML =
                        '<p class="font-body-md text-body-md text-secondary w-full text-center py-2 italic" id="peer-placeholder">No peers connected</p>';
                    peerCount.textContent = "0 Connected";
                    return;
                }

                peerCount.textContent = `${network.peers.size} Connected`;
                let html = "";

                for (const [id, peer] of network.peers.entries()) {
                    const isOnline = peer.dc?.readyState === "open";
                    const statusColor = isOnline ? "bg-[#81c784]" : "bg-error";

                    html += `
                    <div class="flex items-center gap-2 bg-surface-container px-3 py-1.5 rounded-full border border-outline-variant shadow-sm transition-all hover:bg-surface-container-high">
                        <div class="relative flex items-center justify-center">
                            <span class="material-symbols-outlined text-[20px] text-on-surface">account_circle</span>
                            <span class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full ${statusColor} border-2 border-surface-container"></span>
                        </div>
                        <span class="font-label-md text-on-surface">${peer.name}</span>
                    </div>`;
                }
                peersListDiv.innerHTML = html;
            }

            // Connection Logic
            connectBtn.onclick = () => {
                const room = roomInput.value.trim();
                const name = nameInput.value.trim();

                if (!room || !name) {
                    addLog("Validation Error: Room and Name required.", "error");
                    return;
                }

                updateStatus("Connecting...", "connecting");

                if (typeof SimpleP2P === "undefined") {
                    addLog("Fatal Error: SimpleP2P class not found in p2p.js", "error");
                    updateStatus("Disconnected", "disconnected");
                    return;
                }

                network = new SimpleP2P(room, name);

                network.onLog = (msg) => console.log(msg);
                network.onError = (msg) => addLog(`System Error: ${msg}`, "error");

                network.onConnect = async (myId) => {
                    updateStatus(`Connected as ${name}`, "connected");
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;

                    // Unlock Messaging UI
                    sendMsgBtn.disabled = false;
                    sendMsgBtn.classList.remove("opacity-50", "cursor-not-allowed");

                    addLog(`Signaling server connected. Hash ID: ${myId.substring(0, 8)}`, "success");
                    renderPeers();

                    uiRefreshInterval = setInterval(() => {
                        if (network && network.peers.size > 0) renderPeers();
                    }, 1000);

                    if (!network) {
                        addLog("Context Error: Must join a room before initializing media devices.", "error");
                        return;
                    }

                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({
                            audio: {
                                echoCancellation: false,
                                noiseSuppression: false,
                                autoGainControl: false,
                                channelCount: 1,
                            },
                            video: false,
                        });

                        network.addMediaStream(stream);
                        addLog("Hardware active. Mic added to local stream pool.", "success");
                        initAudioBtn.disabled = true;
                    } catch (err) {
                        addLog(`Hardware Error: ${err.message}`, "error");
                    }
                };

                network.onDisconnect = () => {
                    updateStatus("Disconnected", "disconnected");
                    connectBtn.disabled = false;
                    disconnectBtn.disabled = true;

                    // Lock Messaging UI
                    sendMsgBtn.disabled = true;
                    sendMsgBtn.classList.add("opacity-50", "cursor-not-allowed");
                    initAudioBtn.disabled = false;

                    if (uiRefreshInterval) clearInterval(uiRefreshInterval);
                    renderPeers();
                    addLog("Network connection terminated.", "error");
                    network = null;
                };

                network.onPeerJoin = (peerId, peerName) => {
                    addLog(`Peer joined: ${peerName}`, "info");
                    renderPeers();
                };

                network.onPeerLeave = (peerId) => {
                    const audioElement = document.getElementById(`audio-${peerId}`);
                    if (audioElement) {
                        audioElement.pause();
                        audioElement.srcObject = null;
                        audioElement.remove();
                    }
                    addLog("Peer disconnected from room.", "info");
                    renderPeers();
                };

                network.onMessage = (peerId, data) => {
                    const peer = network.peers.get(peerId);
                    const peerName = peer ? peer.name : "Unknown";
                    if (data.type === "message") {
                        addLog(`${peerName}: ${data.text}`, "success");
                    } else {
                        addLog(`Data chunk received from ${peerName}.`, "info");
                    }
                };

                network.onTrack = (peerId, remoteStream) => {
                    addLog(`Receiving audio stream from ${peerId}`, "success");
                    let audioEl = document.getElementById(`audio-${peerId}`);
                    if (!audioEl) {
                        audioEl = document.createElement("audio");
                        audioEl.id = `audio-${peerId}`;
                        audioEl.autoplay = true;
                        document.body.appendChild(audioEl);
                    }
                    audioEl.srcObject = remoteStream;
                };

                network.connect();
            };

            disconnectBtn.onclick = () => {
                if (network) network.disconnect();
            };

            sendMsgBtn.onclick = () => {
                if (!network) return;
                const payload = { type: "message", text: "Hello P2P Network!" };
                network.broadcast(payload);
                addLog(`You: ${payload.text}`, "info");
            };

            initAudioBtn.onclick = async () => {
                if (!network) {
                    addLog("Context Error: Must join a room before initializing media devices.", "error");
                    return;
                }

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false,
                            channelCount: 1,
                        },
                        video: false,
                    });

                    network.addMediaStream(stream);
                    addLog("Hardware active. Mic added to local stream pool.", "success");
                    initAudioBtn.disabled = true;
                } catch (err) {
                    addLog(`Hardware Error: ${err.message}`, "error");
                }
            };
        </script>
    </body>
</html>
