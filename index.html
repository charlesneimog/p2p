<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>P2P Simple - WebRTC</title>
        <style>
            body {
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
                max-width: 600px;
                margin: 0 auto;
                padding: 20px;
                background: #f0f0f0;
            }
            .card {
                background: white;
                border-radius: 16px;
                padding: 20px;
                margin-bottom: 16px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            }
            input,
            button {
                padding: 10px 16px;
                font-size: 14px;
                border: 1px solid #ddd;
                border-radius: 8px;
                margin: 4px;
            }
            button {
                background: #667eea;
                color: white;
                cursor: pointer;
                border: none;
            }
            button:disabled {
                background: #ccc;
            }
            .status {
                padding: 8px;
                border-radius: 8px;
                margin-top: 8px;
                font-size: 12px;
            }
            .connected {
                background: #d4edda;
                color: #155724;
            }
            .disconnected {
                background: #f8d7da;
                color: #721c24;
            }
            .connecting {
                background: #fff3cd;
                color: #856404;
            }
            .peer {
                display: inline-block;
                padding: 8px 12px;
                margin: 4px;
                background: #e0e0e0;
                border-radius: 20px;
                font-size: 12px;
            }
            .peer.online {
                background: #4caf50;
                color: white;
            }
            .log {
                background: #1e1e1e;
                color: #0f0;
                padding: 12px;
                border-radius: 8px;
                font-family: monospace;
                font-size: 11px;
                height: 200px;
                overflow-y: auto;
            }
            .log-entry {
                padding: 2px 0;
                border-bottom: 1px solid #333;
            }
            canvas {
                width: 100%;
                height: 300px;
                background: white;
                border: 1px solid #ddd;
                cursor: crosshair;
            }
            .color-btn {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                margin: 4px;
                cursor: pointer;
                border: 2px solid transparent;
                display: inline-block;
            }
            .color-btn.selected {
                border-color: #333;
                transform: scale(1.1);
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h3>P2P Simple</h3>
            <div>
                <input type="text" id="room" placeholder="Sala" value="demo" />
                <input type="text" id="name" placeholder="Seu nome" value="User" />
                <button id="connectBtn">Conectar</button>
                <button id="disconnectBtn" disabled>Desconectar</button>
            </div>
            <div id="status" class="status disconnected">Desconectado</div>
        </div>

        <div class="card">
            <h4>👥 Participantes</h4>
            <div id="peersList">Nenhum</div>
        </div>

        <div class="card">
            <h4>📨 Mensagens</h4>
            <button id="sendMsgBtn">Enviar "Olá P2P!"</button>
            <div class="log" id="log"></div>
        </div>

        <script src="p2p.js"></script>
        <script>
            // Elementos DOM
            const roomInput = document.getElementById("room");
            const nameInput = document.getElementById("name");
            const connectBtn = document.getElementById("connectBtn");
            const disconnectBtn = document.getElementById("disconnectBtn");
            const statusDiv = document.getElementById("status");
            const peersListDiv = document.getElementById("peersList");
            const logDiv = document.getElementById("log");
            const sendMsgBtn = document.getElementById("sendMsgBtn");

            let network = null;
            let uiRefreshInterval = null;

            // Funções de Auxílio da UI
            function addLog(msg, type = "info") {
                const entry = document.createElement("div");
                entry.className = "log-entry";
                entry.style.color = type === "error" ? "#f00" : type === "success" ? "#0f0" : "#fff";
                entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
                logDiv.insertBefore(entry, logDiv.firstChild);
            }

            function updateStatus(text, state) {
                statusDiv.textContent = text;
                statusDiv.className = `status ${state}`;
            }

            function renderPeers() {
                if (!network || network.peers.size === 0) {
                    peersListDiv.innerHTML = "Nenhum participante";
                    return;
                }

                let html = "";
                for (const [id, peer] of network.peers.entries()) {
                    const isOnline = peer.dc?.readyState === "open";
                    html += `<div class="peer ${isOnline ? "online" : ""}">
                    🟢 ${peer.name}
                </div>`;
                }
                peersListDiv.innerHTML = html;
            }

            // Inicialização e Eventos de Input
            connectBtn.onclick = () => {
                const room = roomInput.value.trim();
                const name = nameInput.value.trim();

                if (!room || !name) {
                    addLog("❌ Preencha sala e nome", "error");
                    return;
                }

                updateStatus("Conectando...", "connecting");
                network = new SimpleP2P(room, name);
                //network.onLog = (msg) => addLog(msg, "info");
                network.onError = (msg) => addLog(`❌ ${msg}`, "error");
                network.onConnect = (myId) => {
                    updateStatus("Conectado", "connected");
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                    addLog(`✅ Conectado ao servidor de sinalização. ID: ${myId.substring(0, 8)}`, "success");
                    renderPeers();
                    uiRefreshInterval = setInterval(() => {
                        if (network && network.peers.size > 0) renderPeers();
                    }, 1000);
                };

                network.onDisconnect = () => {
                    updateStatus("Desconectado", "disconnected");
                    connectBtn.disabled = false;
                    disconnectBtn.disabled = true;
                    if (uiRefreshInterval) clearInterval(uiRefreshInterval);
                    renderPeers();
                    addLog("🔌 Desconectado", "error");
                    network = null;
                };

                network.onPeerJoin = (peerId, peerName) => {
                    addLog(`👋 ${peerName} entrou na sala`);
                    renderPeers();
                };

                network.onPeerLeave = (peerId) => {
                    addLog(`👋 Um usuário saiu`);
                    renderPeers();
                };

                // Roteamento de mensagens recebidas
                network.onMessage = (peerId, data) => {
                    const peer = network.peers.get(peerId);
                    const peerName = peer ? peer.name : "Desconhecido";
                    if (data.type === "message") {
                        addLog(`💬 ${peerName}: ${data.text}`, "success");
                    } else {
                        addLog(`📦 Dados recebidos de ${peerName}: ${JSON.stringify(data)}`);
                    }
                };

                // Inicia a rotina de conexão
                network.connect();
            };

            disconnectBtn.onclick = () => {
                if (network) network.disconnect();
            };

            sendMsgBtn.onclick = () => {
                if (!network) return;

                const payload = { type: "message", text: "Olá P2P!" };
                network.broadcast(payload);

                addLog(`💬 Você: ${payload.text}`, "info");
            };
        </script>
    </body>
</html>
