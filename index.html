<html>
    <body>
        <script>
            const ws = new WebSocket("wss://p2p.charlesneimog.workers.dev?room=teste123");
            ws.onopen = () => console.log("✅ CONECTADO!");
            ws.onerror = (e) => console.error("❌ Erro:", e);
            ws.onmessage = (e) => console.log("📨 Mensagem:", JSON.parse(e.data));

            // Depois de conectar, envie join
            setTimeout(() => {
                ws.send(JSON.stringify({ type: "join", name: "João" }));
            }, 1000);
        </script>
    </body>
</html>
