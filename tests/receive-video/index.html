<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>P2P Receive Video Test</title>
        <link rel="stylesheet" href="../video-test.css" />
    </head>
    <body data-video-mode="receive" data-video-label="Receive Video Test">
        <main>
            <header>
                <h1>Receive Video</h1>
            </header>

            <section class="controls" aria-label="Connection controls">
                <label>
                    Room name
                    <input id="room-name" type="text" value="node-alpha" />
                </label>
                <label>
                    User name
                    <input id="user-name" type="text" />
                </label>
                <button class="primary" id="btn-connect" type="button">Connect</button>
                <button class="secondary" id="btn-disconnect" type="button" disabled>Disconnect</button>
            </section>

            <div class="status" id="status">Disconnected</div>

            <section class="grid" aria-label="Video panels">
                <article class="panel" id="local-panel">
                    <h2>Local Video</h2>
                    <p class="muted" id="local-state"></p>
                    <video id="local-video" autoplay muted playsinline></video>
                </article>
                <article class="panel" id="remote-panel">
                    <h2>Remote Video</h2>
                    <p class="muted" id="remote-state"></p>
                    <div class="remote-list" id="remote-list"></div>
                </article>
            </section>

            <section class="panel" aria-label="Messages">
                <h2>Messages</h2>
                <div class="messages">
                    <input id="message-text" type="text" placeholder="Write a test message" />
                    <button class="secondary" id="btn-send-message" type="button" disabled>Send</button>
                </div>
                <div class="log" id="log" aria-label="Connection log"></div>
            </section>
        </main>
        <script src="../../p2p.js"></script>
        <script src="../video-test.js"></script>
    </body>
</html>
