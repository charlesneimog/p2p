<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wooden Manta Ray Automaton</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        overflow: hidden;
        background: #030609;
      }

      canvas {
        display: block;
      }

      .p2p-camera-panel {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 8px;
        max-width: calc(100vw - 28px);
        padding: 8px;
        color: #f6f8f8;
        font: 13px/1.25 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: rgba(3, 6, 9, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        backdrop-filter: blur(10px);
      }

      .p2p-camera-panel label {
        display: grid;
        gap: 2px;
        min-width: 120px;
      }

      .p2p-camera-panel span {
        color: rgba(246, 248, 248, 0.68);
        font-size: 11px;
      }

      .p2p-camera-panel input,
      .p2p-camera-panel button {
        height: 30px;
        color: #f6f8f8;
        font: inherit;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 6px;
      }

      .p2p-camera-panel input {
        width: 150px;
        padding: 0 8px;
      }

      .p2p-camera-panel button {
        padding: 0 10px;
        cursor: pointer;
      }

      .p2p-camera-panel button:disabled {
        cursor: default;
        opacity: 0.55;
      }

      #p2p-status {
        min-width: 160px;
        color: rgba(246, 248, 248, 0.8);
        white-space: nowrap;
      }

      @media (max-width: 720px) {
        .p2p-camera-panel {
          align-items: stretch;
          flex-direction: column;
        }

        .p2p-camera-panel label,
        .p2p-camera-panel input,
        #p2p-status {
          width: 100%;
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="p2p-camera-panel">
      <label>
        <span>Room</span>
        <input id="p2p-room" autocomplete="off" />
      </label>
      <label>
        <span>Name</span>
        <input id="p2p-name" autocomplete="off" />
      </label>
      <button id="p2p-connect" type="button">Connect</button>
      <button id="p2p-disconnect" type="button" disabled>Disconnect</button>
      <div id="p2p-status">Disconnected</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script src="../../p2p.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
