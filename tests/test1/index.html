<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>P2P Receiver Video Test</title>
        <style>
            :root {
                color-scheme: light;
                font-family:
                    Inter,
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                background: #f7f7f4;
                color: #171717;
            }

            * {
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                margin: 0;
                display: grid;
                place-items: center;
                padding: 0;
            }

            main {
                width: 100vw;
                min-height: 100vh;
                display: grid;
                grid-template-rows: auto auto auto minmax(0, 1fr) auto;
                gap: 16px;
                padding: 16px;
            }

            header,
            .controls,
            .status,
            .log {
                border: 1px solid #d7d7d2;
                border-radius: 8px;
                background: #ffffff;
            }

            header {
                padding: 18px 20px;
            }

            h1 {
                margin: 0;
                font-size: 24px;
                line-height: 1.15;
            }

            .controls {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr)) minmax(140px, 0.7fr) auto auto auto;
                gap: 12px;
                align-items: end;
                padding: 16px;
            }

            label {
                display: grid;
                gap: 6px;
                color: #5a5a55;
                font-size: 13px;
                font-weight: 600;
            }

            input {
                width: 100%;
                border: 1px solid #c8c8c2;
                border-radius: 6px;
                padding: 10px 12px;
                font: inherit;
                color: #171717;
                background: #fbfbf8;
            }

            input[type="range"] {
                height: 42px;
                border: 0;
                padding: 0;
                accent-color: #171717;
                background: transparent;
            }

            button {
                min-height: 42px;
                border: 1px solid #171717;
                border-radius: 6px;
                padding: 0 16px;
                font: inherit;
                font-weight: 700;
                cursor: pointer;
            }

            button.primary {
                color: #ffffff;
                background: #171717;
            }

            button.secondary {
                color: #171717;
                background: #ffffff;
            }

            button:disabled {
                cursor: not-allowed;
                opacity: 0.5;
            }

            .status {
                padding: 12px 16px;
                color: #4d4d48;
                font-weight: 700;
            }

            .status.connected {
                border-color: #2f7d4d;
                color: #185d32;
                background: #eaf6ee;
            }

            .status.error {
                border-color: #b3261e;
                color: #8c1d18;
                background: #ffedea;
            }

            .stage {
                position: relative;
                min-height: 0;
                overflow: hidden;
                border: 1px solid #111111;
                border-radius: 8px;
                background: #111111;
            }

            .stage:fullscreen {
                width: 100vw;
                height: 100vh;
                border: 0;
                border-radius: 0;
            }

            video {
                width: 100%;
                height: 100%;
                display: none;
                object-fit: contain;
                background: #111111;
            }

            #remote-mix {
                display: none;
            }

            #sketch-container,
            #sketch-container canvas {
                position: absolute;
                inset: 0;
                width: 100% !important;
                height: 100% !important;
                display: block;
            }

            .empty {
                position: absolute;
                inset: 0;
                display: grid;
                place-items: center;
                padding: 24px;
                color: #d8d8d2;
                text-align: center;
                pointer-events: none;
            }

            .empty[hidden] {
                display: none;
            }

            .mix-count {
                position: absolute;
                top: 12px;
                right: 12px;
                z-index: 2;
                padding: 6px 10px;
                border-radius: 6px;
                color: #f0f0ea;
                background: rgb(17 17 17 / 0.72);
                font-size: 12px;
                font-weight: 700;
                pointer-events: none;
            }

            .log {
                min-height: 120px;
                max-height: 180px;
                overflow: auto;
                padding: 12px;
                color: #f0f0ea;
                background: #20201e;
                font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
                font-size: 13px;
            }

            .log div + div {
                margin-top: 6px;
            }

            @media (max-width: 720px) {
                body {
                    padding: 0;
                }

                main {
                    padding: 12px;
                }

                .controls {
                    grid-template-columns: 1fr;
                }

                .stage {
                    min-height: 0;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <header>
                <h1>Received Video</h1>
            </header>

            <script
                src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/2.0.5/p5.min.js"
                integrity="sha512-jOTg6ikYiHx1LvbSOucnvZi4shXbaovZ91+rfViIiUFLgAJK+k1oQtGEaLvDB8rsZwEfUksTgmhrxdvEDykuzQ=="
                crossorigin="anonymous"
                referrerpolicy="no-referrer"
            ></script>

            <section class="controls" aria-label="Connection controls">
                <label>
                    Room name
                    <input id="room-name" type="text" value="node-alpha" />
                </label>
                <label>
                    User name
                    <input id="user-name" type="text" />
                </label>
                <label>
                    Noise
                    <input id="noise-amount" type="range" min="0" max="1" step="0.01" value="0.7" />
                </label>
                <button class="primary" id="btn-connect" type="button">Connect</button>
                <button class="secondary" id="btn-disconnect" type="button" disabled>Disconnect</button>
                <button class="secondary" id="btn-fullscreen" type="button">Fullscreen</button>
            </section>

            <div class="status" id="status">Disconnected</div>

            <section class="stage" aria-label="Remote video">
                <canvas id="remote-mix"></canvas>
                <div id="sketch-container"></div>
                <div class="mix-count" id="mix-count">0 sources</div>
                <div class="empty" id="empty-state">Waiting for remote video...</div>
            </section>

            <section class="log" id="log" aria-label="Connection log"></section>
        </main>
        <script src="../../p2p.js"></script>
        <script src="videop2p.js"></script>
        <script src="sketch.js"></script>
    </body>
</html>
